name: Release binaries

on:
  release:
    types: [published]

permissions:
  contents: read

env:
  BIN_NAME: ibroadcast-tui
  CARGO_TERM_COLOR: always
  TAG_NAME: ${{ github.event.release.tag_name }}

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            exe_ext: ""
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            exe_ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            exe_ext: ".exe"
          - os: macos-15-intel
            target: x86_64-apple-darwin
            exe_ext: ""
          - os: macos-15
            target: aarch64-apple-darwin
            exe_ext: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux audio dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libasound2-dev

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Stage Unix binary
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          asset_path="${BIN_NAME}-${TAG_NAME}-${{ matrix.target }}"
          cp "target/${{ matrix.target }}/release/${BIN_NAME}" "${asset_path}"
          echo "ASSET_PATH=${asset_path}" >> "${GITHUB_ENV}"

      - name: Stage Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $assetStem = "${env:BIN_NAME}-${env:TAG_NAME}-${{ matrix.target }}"
          $assetPath = "$assetStem${{ matrix.exe_ext }}"
          Copy-Item "target/${{ matrix.target }}/release/${env:BIN_NAME}${{ matrix.exe_ext }}" $assetPath
          "ASSET_PATH=$assetPath" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ${{ env.ASSET_PATH }}
          if-no-files-found: error

  publish:
    name: Upload release assets
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Download packaged binaries
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: release-assets/*

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
